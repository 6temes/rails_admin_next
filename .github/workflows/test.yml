name: Test

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rspec:
    name: RSpec (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Single supported runtime (Ruby 4.0.5 / Rails 8.1 / ActiveRecord / importmap + Propshaft).
        # The adapter axis is kept because the filter/search SQL is generated per-adapter
        # (AbstractModel::StatementBuilder), so each adapter exercises a distinct code path.
        adapter: [sqlite3, postgresql, mysql2]
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        options: --health-cmd "mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
      CI_DB_ADAPTER: ${{ matrix.adapter }}
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Install libvips
        # ActiveStorage's :vips variant processor; ruby-vips dlopens the libvips shared library.
        # libvips-dev is the version-stable package name (the runtime lib is libvips42t64 on
        # Ubuntu 24.04 after the t64 transition); installing -dev pulls in that runtime.
        run: sudo apt-get update && sudo apt-get install -y libvips-dev
      # Chrome is pre-installed on ubuntu-latest; Cuprite/Ferrum auto-detect it for the js: true specs.
      - name: Provision the dummy app database
        working-directory: spec/dummy_app
        run: bundle exec rake rails_admin:prepare_ci_env db:create db:schema:load
      - name: Run tests
        run: bundle exec rspec

  standard:
    name: Standard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
      - name: Run Standard
        run: bundle exec standardrb

  brakeman:
    name: Brakeman
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
      # -A runs the full check set; reviewed false positives are recorded in config/brakeman.ignore.
      - name: Run Brakeman
        run: bundle exec brakeman -A --no-pager

  bundler-audit:
    name: Bundler-Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
      # --update refreshes the advisory DB first; ignores live in .bundler-audit.yml.
      - name: Run bundler-audit
        run: bundle exec bundler-audit check --update

  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      # No package.json ships (importmap self-hosts the runtime modules), so Prettier is pinned via
      # npx and only formats the JS/CSS source. See .prettierignore for what is intentionally excluded.
      - name: Check JS/CSS formatting
        run: npx --yes prettier@2.8.8 --check .
