name: Publish Gem

on:
  push:
    tags: ["v*"]

jobs:
  push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "4.0"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

      # The release tag is the single source of the released version: stamp it into
      # version.rb before building, so publishing a Release-Drafter draft needs no
      # version-bump commit and the SHIPPED gem still carries a real constant at host-app
      # runtime (an ENV-fallback constant would degrade to a dev placeholder there).
      # Integer() makes a malformed or non-three-part tag fail loudly before anything builds.
      - name: Stamp the tag version into version.rb
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ruby -e '
            major, minor, patch = ENV.fetch("VERSION").split(".", 3)
            path = "lib/rails_admin_next/version.rb"
            src = File.read(path)
            src.sub!(/MAJOR = \d+/, "MAJOR = #{Integer(major)}")
            src.sub!(/MINOR = \d+/, "MINOR = #{Integer(minor)}")
            src.sub!(/PATCH = \d+/, "PATCH = #{Integer(patch)}")
            File.write(path, src)
          '

      # `gem build` reads the (freshly stamped) RailsAdminNext::Version constant standalone
      # (no bundler). The tag version reaches the shell via env (never interpolated into
      # run:), and the push still fails loudly if the artifact and tag ever disagree.
      - name: Build and push gem
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gem build rails_admin_next.gemspec
          gem push "rails_admin_next-${VERSION}.gem"
